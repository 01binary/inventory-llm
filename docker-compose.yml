services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: inventory-demo-app
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      AppPaths__DatabasePath: /data/inventory.db
      AppPaths__SqlScriptsPath: /app/db
      AppPaths__SystemPromptPath: /app/SYSTEM_PROMPT.md
      ModelServices__LlmBaseUrl: ${LLM_BASE_URL:-http://host.docker.internal:1234}
      ModelServices__LlmModel: ${LLM_MODEL:-auto}
      ModelServices__McpServerUrl: ${MCP_SERVER_URL:-http://localhost:8080/mcp}
      ModelServices__LlmCompletionPath: ${LLM_COMPLETION_PATH:-/v1/chat/completions}
      ModelServices__LlmHealthPath: ${LLM_HEALTH_PATH:-/v1/models}
    ports:
      - "8080:8080"
    volumes:
      - ./docker/data/sqlite:/data
